# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: 名称:部署Jekyil,并预先安装吉塔布页依赖项

on:
  #继续以默认分支为目标# Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  #允许您从操作选项卡手动运行此工作流# Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents:   内容:改为
  pages:   页:书写
  id-token:   印:写

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  #建工# Build job
  build:
    runs-on:     最新运行:
    steps:
      - name:       名称:结账
        uses:         用途:行动/结账@V4
      - name:       -名称:设置页
        uses:         用途:操作/配置页@V5
      - name:       名称:用犹太人建造
        uses:         用途:行动/犹太人建设页@V1
        with:
          source:           source: ./
          destination:           目的地:/_地点
      - name:       -名称:上载艺术品
        uses:         用途:动作/上传-页面-艺术品@v3

  #部署作业# Deployment job
  deploy:
    environment:
      name:       姓名:吉特布-帕奇
      url:       url: ${{ steps.deployment.outputs.page_url }}{{ steps.deployment.outputs.page_url }}
    runs-on:     最新运行:
    needs:     需求:建设
    steps:
      - name:       -名称:部署到千分通页
        id:         说明:部署
        uses:         用途:行动/部署页@V4
